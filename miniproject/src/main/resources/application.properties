spring.application.name=loanEmiMgmt
# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/northernarc
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=12345

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=VGhpc0lzQVNlY3VyZUFuZExvbmdFbm91Z2hLZXlGb3JMb2FuRW1pTWdtdDIwMjY=
app.jwt.expiration-ms=3600000

# Logging Configuration with Automatic File Rollover
# Configure maximum file size before rollover occurs
LOG_MAX_FILE_SIZE=10MB

# Keep log files for this many days before automatic deletion
LOG_MAX_HISTORY_DAYS=30

# Maximum total disk space for all archived application logs (application*.log)
LOG_TOTAL_SIZE_CAP=1GB

# Maximum total disk space for all archived error logs (error*.log, service*.log, security*.log, api*.log)
LOG_TOTAL_SIZE_CAP_ERROR=500MB

# Logging Levels
logging.level.root=INFO
logging.level.org.example.loanemimgmt=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Application logs directory
logging.file.path=logs
