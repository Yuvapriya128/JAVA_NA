@if (confirmationDialog.state().visible) {
  <div class="confirmation-backdrop" (click)="onBackdropClick($event)">
    <div class="confirmation-card card border-0 shadow-lg" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="card-body p-4">
        <div class="d-flex align-items-start gap-3">
          <div class="confirmation-icon" [ngClass]="'variant-' + confirmationDialog.state().variant" aria-hidden="true">
            <i class="bi bi-exclamation-circle-fill"></i>
          </div>
          <div class="flex-grow-1">
            <h5 class="mb-2" id="confirm-title">{{ confirmationDialog.state().title }}</h5>
            <p class="confirmation-message mb-0">{{ confirmationDialog.state().message }}</p>
          </div>
        </div>
        <div class="d-flex gap-2 justify-content-end mt-4">
          <button type="button" class="btn btn-outline-secondary" (click)="confirmationDialog.cancel()">
            {{ confirmationDialog.state().cancelText }}
          </button>
          <button
            type="button"
            class="btn"
            [ngClass]="confirmationDialog.state().variant === 'danger' ? 'btn-danger' : 'btn-primary'"
            (click)="confirmationDialog.approve()">
            {{ confirmationDialog.state().confirmText }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
