    <div class="card border-0 shadow-soft profile-card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar">{{ initials() }}</div>
          <div>
            <h6 class="mb-0">{{ profile?.customerName || 'N/A' }}</h6>
            <small class="text-muted">{{ roleLabel() }}</small>
          </div>
        </div>
        <hr />
        <p class="small text-muted mb-1">Branch</p>
        <p class="mb-2">{{ profile?.city || 'N/A' }}</p>
        <p class="small text-muted mb-1">Email</p>
        <p class="mb-0">{{ profile?.email || 'N/A' }}</p>
      </div>
    </div>
