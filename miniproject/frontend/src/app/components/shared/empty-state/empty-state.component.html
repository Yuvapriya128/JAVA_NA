<div class="card border-0 shadow-soft text-center py-5 empty-state-shell">
  <div class="card-body">
    <div class="empty-state-icon">
      <i class="{{ iconClass }}" aria-hidden="true"></i>
    </div>
    <h5 class="mt-3">{{ title }}</h5>
    <p class="text-muted mb-3">{{ subtitle }}</p>
    @if (actionRoute) {
      <a class="btn btn-outline-primary btn-sm" [routerLink]="actionRoute">{{ actionLabel }}</a>
    }
  </div>
</div>
