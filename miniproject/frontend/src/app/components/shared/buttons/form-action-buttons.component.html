<div class="col-12 d-flex gap-2 justify-content-end form-actions">
  <button type="reset" class="btn btn-outline-secondary" (click)="resetClick.emit()">{{ resetLabel }}</button>
  <button type="button" class="btn btn-outline-secondary" (click)="cancelClick.emit()">{{ cancelLabel }}</button>
  <button type="button" [class]="submitClass" [disabled]="loading || disableSubmit" (click)="submitClick.emit()">
    @if (loading) {
    <img src="/loading.svg" alt="" class="loading-image me-2" aria-hidden="true" />
    }
    {{ submitLabel }}
  </button>
</div>
