    <section class="page-header card border-0 shadow-soft mb-4">
      <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <p class="text-uppercase small mb-1">{{ subtitle }}</p>
          <h3 class="mb-0">{{ title }}</h3>
        </div>
        @if (buttonLabel && buttonRoute) {
        <a [routerLink]="buttonRoute" class="btn btn-primary px-4">
          <i class="bi bi-plus-lg me-2"></i>{{ buttonLabel }}
        </a>
        } @else if (buttonLabel) {
        <button type="button" class="btn btn-primary px-4">
          <i class="bi bi-plus-lg me-2"></i>{{ buttonLabel }}
        </button>
        }
      </div>
    </section>
