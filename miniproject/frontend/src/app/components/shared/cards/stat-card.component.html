    <div class="card stat-card h-100 border-0 shadow-soft">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="text-muted small mb-2">{{ title }}</p>
            <h4 class="mb-1">{{ value }}</h4>
            <small class="text-success" *ngIf="trend">{{ trend }}</small>
          </div>
          <span class="icon-badge" [ngClass]="'tone-' + tone">
            <i class="bi" [ngClass]="icon"></i>
          </span>
        </div>
      </div>
    </div>
