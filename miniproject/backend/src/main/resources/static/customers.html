<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Lendora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container">
        <a class="navbar-brand" href="dashboard.html"><i class="fa-solid fa-hand-holding-dollar me-2"></i>Lendora</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="customers.html">Customers</a></li>
                <li class="nav-item"><a class="nav-link" href="loans.html">Loans</a></li>
                <li class="nav-item"><a class="nav-link" href="emi.html">EMI</a></li>
                <li class="nav-item d-flex align-items-center mt-2 mt-lg-0"><span id="roleBadge" class="role-badge role-user">USER</span></li>
                <li class="nav-item"><button class="btn btn-sm btn-light mt-2 mt-lg-0" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </div>
</nav>

<main class="page-wrap">
    <div class="container">
        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
            <h1 class="section-title mb-0">Customer Management</h1>
            <div class="d-flex gap-2">
                <input type="number" id="customerIdSearch" class="form-control search-box" placeholder="Enter customer ID">
                <button class="btn btn-outline-primary" id="getCustomerBtn"><i class="fa-solid fa-id-card me-1"></i>Get Customer</button>
                <button class="btn btn-outline-primary" id="getAllCustomersBtn"><i class="fa-solid fa-users me-1"></i>Get All</button>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#customerModal" id="addCustomerBtn"><i class="fa-solid fa-user-plus me-1"></i>Add Customer</button>
            </div>
        </div>

        <div id="customerAlert" class="alert d-none"></div>
        <div class="access-panel p-3 mb-3">
            <div class="fw-bold mb-2">What you can do here</div>
            <div id="customerRoleHelpText" class="text-muted"></div>
        </div>

        <div class="table-wrap mb-3 d-none" id="adminAuditSection">
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <h2 class="h6 mb-0 fw-bold">Admin Activity History</h2>
            </div>
            <div class="p-3">
                <ul class="mb-0 ps-3" id="adminAuditList">
                    <li class="text-muted">No admin activity recorded yet.</li>
                </ul>
            </div>
        </div>

        <div class="table-wrap">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Customer Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th>Credit Score</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="customersBody">
                    <tr><td colspan="8" class="empty-state">Use Get All or search by customer ID.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="customerModalTitle">Add Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="customerForm" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="customerId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="customerName" class="form-label">Customer Name</label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="customerEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="customerEmail" required>
                        </div>
                        <div class="col-md-6">
                            <label for="customerPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="customerPassword">
                        </div>
                        <div class="col-md-6">
                            <label for="customerPhone" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="customerPhone" required>
                        </div>
                        <div class="col-md-6">
                            <label for="customerCity" class="form-label">City</label>
                            <input type="text" class="form-control" id="customerCity" required>
                        </div>
                        <div class="col-md-6">
                            <label for="creditScore" class="form-label">Credit Score</label>
                            <input type="number" class="form-control" id="creditScore" min="0" max="900" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app-data.js"></script>
<script src="js/customer.js"></script>
</body>
</html>
