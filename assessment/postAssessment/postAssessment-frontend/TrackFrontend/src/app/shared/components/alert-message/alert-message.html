<div class="alert-stack" aria-live="polite">
  @for (item of notifications.notifications(); track item.id) {
    <div class="alert" [class]="'alert--' + item.type" role="alert">
      <span class="alert__text">{{ item.message }}</span>
      <button
        type="button"
        class="alert__close"
        aria-label="Dismiss"
        (click)="notifications.dismiss(item.id)"
      >
        &times;
      </button>
    </div>
  }
</div>
