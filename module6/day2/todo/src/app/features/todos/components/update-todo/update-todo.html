<input type="number" placeholder="Enter todo ID" [(ngModel)]="newTodo.id"/>
<input type="text" placeholder="Enter todo title" [(ngModel)]="newTodo.title"/>
<input type="text" placeholder="Enter todo description" [(ngModel)]="newTodo.description"/>
<button type="button" class="btn btn-primary" (click)="updateTodo(newTodo)">Update Todo</button>
