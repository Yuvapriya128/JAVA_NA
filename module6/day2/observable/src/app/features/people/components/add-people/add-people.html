<label class="form-label fw-semibold" for="add-person-name">Add person</label>
<div class="input-group">
  <input
    id="add-person-name"
    class="form-control"
    type="text"
    [(ngModel)]="newName"
    placeholder="Enter a name"
  >
  <button class="btn btn-primary" type="button" (click)="peopleServices.addName(newName)">
    Add
  </button>
</div>
