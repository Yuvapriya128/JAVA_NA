<article class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
      <h2 class="h5 mb-0">Count</h2>
      <span class="badge text-bg-primary fs-6 px-3 py-2">{{ countService.getCount() | async }}</span>
    </div>

    <div class="row g-3">
      <div class="col-12 col-md-6">
        <app-increment></app-increment>
      </div>
      <div class="col-12 col-md-6">
        <app-increment-by></app-increment-by>
      </div>
      <div class="col-12 col-md-6">
        <app-decrement></app-decrement>
      </div>
      <div class="col-12 col-md-6">
        <app-decrement-by></app-decrement-by>
      </div>
    </div>
  </div>
</article>
