<main class="container py-5">
  <section class="card border-0 shadow-sm mb-4">
	<div class="card-body p-4">
	  <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-3">
		<h1 class="h4 mb-0">Movie Manager</h1>
		<div class="form-check form-switch mb-0">
		  <input class="form-check-input" type="checkbox" id="toggleUpdate" [(ngModel)]="showupdate">
		  <label class="form-check-label" for="toggleUpdate">Enable update mode</label>
		</div>
	  </div>

	  @if(!showupdate){
		<app-add-movie></app-add-movie>
	  }
	  @else {
		<app-update-movie></app-update-movie>
	  }
	</div>
  </section>

  <section>
	<div class="d-flex justify-content-between align-items-center mb-3">
	  <h2 class="h5 mb-0">Movie List</h2>
	  <span class="badge text-bg-light">{{ movieServices.getMovies()().length }} items</span>
	</div>

	<div class="row g-3">
	  @for(movie of movieServices.getMovies()(); track $index){
		<div class="col-12 col-md-6 col-xl-4">
		  <div class="d-grid gap-2">
			<app-movie-items [movie]="movie"></app-movie-items>
			<button class="btn btn-sm btn-outline-danger" (click)="movieServices.deleteMovie(movie)">Delete</button>
		  </div>
		</div>
	  }
	</div>
  </section>
</main>
