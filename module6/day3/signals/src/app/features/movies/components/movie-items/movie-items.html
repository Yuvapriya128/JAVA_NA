<div class="card border-0 shadow-sm h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h3 class="h6 mb-0">{{ movie.title }}</h3>
      <span class="badge text-bg-secondary">#{{ movie.id }}</span>
    </div>
    <p class="text-secondary mb-2"><span class="fw-semibold">Director:</span> {{ movie.director }}</p>
    <div class="d-flex justify-content-between align-items-center">
      <span class="badge text-bg-light border">{{ movie.genre }}</span>
      <span class="small fw-semibold text-warning">Rating: {{ movie.rating }}/5</span>
    </div>
  </div>
</div>
