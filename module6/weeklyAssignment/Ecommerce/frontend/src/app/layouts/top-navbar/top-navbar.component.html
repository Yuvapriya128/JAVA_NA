<nav class="navbar-top">
  <div class="navbar-container">
    <!-- Left Section: Menu Toggle + Logo -->
    <div class="navbar-left">
      <button type="button" class="btn-menu-toggle" (click)="onToggleSidebar()" title="Toggle menu" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>

      <a routerLink="/" class="navbar-brand">
        <span class="brand-icon">📱</span>
        <span class="brand-text">eCommerce</span>
      </a>
    </div>

    <!-- Center Section: Search (Optional) -->
    <div class="navbar-center d-none d-md-flex">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search products...">
      </div>
    </div>

    <!-- Right Section: User Menu -->
    <div class="navbar-right">
      <!-- Notifications -->
      <button type="button" class="btn-icon" title="Notifications" aria-label="Open notifications">
        <i class="bi bi-bell"></i>
        <span class="notification-badge">3</span>
      </button>

      <!-- User Menu -->
      <div class="user-menu-wrapper">
        <button type="button" class="btn-user-menu" (click)="openUserMenu()" aria-label="Open user menu">
          <i class="bi bi-person-circle"></i>
          <span class="user-name">{{ userLabel }}</span>
          <i class="bi bi-chevron-down"></i>
        </button>

        <!-- User Dropdown Menu -->
        <div class="user-dropdown">
          <div class="dropdown-item">
            <span class="dropdown-label">Role:</span>
            <span class="dropdown-value">{{ roleLabel }}</span>
          </div>
          <hr class="dropdown-divider">
          <a routerLink="/profile" class="dropdown-item">
            <i class="bi bi-person"></i>
            Profile
          </a>
          <a routerLink="/settings" class="dropdown-item">
            <i class="bi bi-gear"></i>
            Settings
          </a>
          <hr class="dropdown-divider">
          <button (click)="onLogout()" class="dropdown-item btn-logout">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
