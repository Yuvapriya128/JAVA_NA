<aside class="sidebar" [class.sidebar-open]="isOpen">
  <div class="sidebar-content">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <h3 class="sidebar-title">Menu</h3>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
      <a
        *ngFor="let item of menuItems()"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' || item.route === '/profile' }"
        class="nav-link"
        (click)="onItemClick()"
      >
        <i *ngIf="item.icon" [class]="'bi ' + item.icon"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <!-- View Mode Toggle -->
      <div class="view-mode-section" *ngIf="isViewingAsUser()">
        <button class="btn-view-mode" (click)="onReturnToAdmin()">
          <i class="bi bi-arrow-left-short"></i>
          <span>Return to Admin</span>
        </button>
      </div>

      <div class="view-mode-section" *ngIf="canSwitchToUserView()">
        <button class="btn-view-mode" (click)="onViewAsUser()">
          <i class="bi bi-person-check"></i>
          <span>View as User</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" (click)="onItemClick()"></div>
</aside>
