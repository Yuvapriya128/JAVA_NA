<section class="profile-container">
  <header class="profile-header">
    <h1 class="app-page-title">My Profile</h1>
    <p>Manage account details, preferences, and order activity.</p>
  </header>

  <div class="profile-grid">
    <article class="profile-card app-surface">
      <div class="profile-top">
        <div class="avatar"><i class="bi bi-person-circle"></i></div>
        <div>
          <h2>{{ name() }}</h2>
          <p>{{ email() }}</p>
          <span class="badge" [ngClass]="'badge-' + role().toLowerCase()">{{ role() }}</span>
        </div>
      </div>

      <div class="profile-fields">
        <div class="profile-field">
          <label class="field-label">Customer ID</label>
          <p class="field-value">#{{ customerId() }}</p>
        </div>
        <div class="profile-field">
          <label class="field-label">Role</label>
          <p class="field-value text-uppercase">{{ role() }}</p>
        </div>
      </div>

      <div class="profile-actions">
        <button class="btn btn-primary"><i class="bi bi-pencil me-2"></i>Edit Profile</button>
        <button class="btn btn-outline-secondary"><i class="bi bi-shield-lock me-2"></i>Change Password</button>
      </div>
    </article>

    <aside class="profile-side app-surface">
      <h3>Account Summary</h3>
      <div class="metric-row"><span><i class="bi bi-bag-check me-2"></i>Recent Orders</span><strong>--</strong></div>
      <div class="metric-row"><span><i class="bi bi-heart me-2"></i>Wishlist Items</span><strong>--</strong></div>
      <div class="metric-row"><span><i class="bi bi-cart me-2"></i>Cart Items</span><strong>--</strong></div>
      <div class="metric-row"><span><i class="bi bi-geo-alt me-2"></i>Saved Addresses</span><strong>1</strong></div>
    </aside>
  </div>
</section>
