
    <div class="form-container">
      <div class="header">
        <h2>Edit Customer</h2>
        <button class="btn-back" (click)="onCancel()">← Cancel</button>
      </div>

      <div *ngIf="isLoading" class="loading">Loading...</div>

      <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" formControlName="name" placeholder="Enter customer name" />
          <small *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="error">
            Name is required and must be at least 3 characters
          </small>
        </div>

        <div class="form-group">
          <label>Email *</label>
          <input type="email" formControlName="email" placeholder="Enter email address" />
          <small *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="error">
            Valid email is required
          </small>
        </div>

        <div class="form-group">
          <label>Address *</label>
          <input type="text" formControlName="address" placeholder="Enter address" />
          <small *ngIf="form.get('address')?.invalid && form.get('address')?.touched" class="error">
            Address is required and must be at least 5 characters
          </small>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" formControlName="phoneNumber" placeholder="Enter phone number (e.g., +1234567890)" />
          <small *ngIf="form.get('phoneNumber')?.invalid && form.get('phoneNumber')?.touched" class="error">
            Please enter a valid phone number
          </small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save" [disabled]="form.invalid || isSubmitting">
            {{ isSubmitting ? 'Saving...' : 'Save' }}
          </button>
          <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        </div>

        <div *ngIf="error" class="alert-error">{{ error }}</div>
      </form>
    </div>
