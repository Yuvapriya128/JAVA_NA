
    <div class="view-container">
      <div class="header">
        <h2>Order Item Details</h2>
        <button class="btn-back" (click)="onBack()">← Back</button>
      </div>

      <div *ngIf="isLoading" class="loading">Loading...</div>

      <div *ngIf="!isLoading && errorMessage" class="error" style="padding: 20px; background: #f8d7da; color: #721c24; border-radius: 4px; margin-bottom: 20px;">
        {{ errorMessage }}
      </div>

      <div *ngIf="!isLoading && item" class="details-card">
        <div class="detail-row">
          <label>Item ID:</label>
          <span>{{ item.id }}</span>
        </div>
        <div class="detail-row">
          <label>Order ID:</label>
          <span>{{ item.orderId }}</span>
        </div>
        <div class="detail-row">
          <label>Product ID:</label>
          <span>{{ item.productId }}</span>
        </div>
        <div class="detail-row">
          <label>Quantity:</label>
          <span>{{ item.quantity }}</span>
        </div>
        <div class="detail-row">
          <label>Unit Price:</label>
          <span>{{ item.unitPrice | currency }}</span>
        </div>

        <div class="actions">
          <button class="btn-edit" (click)="onEdit()">Edit</button>
          <button class="btn-delete" (click)="onDelete()">Delete</button>
        </div>
      </div>

      <div *ngIf="!isLoading && !item && !errorMessage" class="error">Order item not found</div>
    </div>
