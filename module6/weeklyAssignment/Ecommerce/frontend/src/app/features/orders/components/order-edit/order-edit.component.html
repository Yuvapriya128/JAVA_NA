
    <div class="form-container">
      <div class="header">
        <h2>Edit Order</h2>
        <button class="btn-back" (click)="onCancel()">← Cancel</button>
      </div>

      <div *ngIf="isLoading" class="loading">Loading...</div>

      <form *ngIf="!isLoading" [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
        <div class="form-group">
          <label>Order ID</label>
          <input type="number" [value]="orderId" readonly />
        </div>

        <div class="form-group">
          <label>Customer ID</label>
          <input type="number" [value]="orderCustomerId" readonly />
        </div>

        <div class="form-group">
          <label>Total Amount</label>
          <input type="text" [value]="orderTotalAmount | currency" readonly />
        </div>

        <div class="form-group">
          <label>Status *</label>
          <select formControlName="status">
            <option value="">Select status</option>
            <option value="PENDING">Pending</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
          <small *ngIf="form.get('status')?.invalid && form.get('status')?.touched" class="error">
            Status is required
          </small>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save" [disabled]="form.invalid || isSubmitting">
            {{ isSubmitting ? 'Saving...' : 'Save' }}
          </button>
          <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        </div>

        <div *ngIf="error" class="alert-error">{{ error }}</div>
      </form>
    </div>
