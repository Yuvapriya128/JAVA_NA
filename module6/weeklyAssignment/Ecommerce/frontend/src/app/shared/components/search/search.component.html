<div class="search-wrap position-relative">
  <div class="input-group">
    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
    <input
      type="search"
      class="form-control"
      [placeholder]="placeholder"
      [value]="searchTerm"
      [attr.aria-label]="ariaLabel"
      autocomplete="off"
      (focus)="onFocus()"
      (blur)="closeSuggestions()"
      (keydown)="onKeydown($event)"
      (input)="onSearchChange($event)" />
    <button type="button" class="btn btn-outline-secondary" *ngIf="searchTerm" (click)="clear()" aria-label="Clear search">
      <i class="bi bi-x-lg"></i>
    </button>
    <button type="button" class="btn btn-primary" (click)="onSearch()" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
      {{ buttonLabel }}
    </button>
  </div>

  <ul
    *ngIf="isSuggestionOpen"
    class="list-group position-absolute suggestion-list w-100"
    role="listbox"
    [attr.aria-label]="'Suggestions for ' + searchTerm">
    <li
      *ngFor="let suggestion of filteredSuggestions; trackBy: trackBySuggestion"
      class="list-group-item list-group-item-action"
      role="option"
      tabindex="0"
      (mousedown)="selectSuggestion(suggestion)"
      (keydown.enter)="selectSuggestion(suggestion)">
      {{ suggestion }}
    </li>
  </ul>
</div>
