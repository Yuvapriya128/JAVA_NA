<div class="checkout-stepper">
  <div class="stepper-container">
    <div class="stepper-track"></div>

    <div class="steps-list">
      <div
        *ngFor="let step of steps; let i = index"
        class="step-item"
        [class.step-complete]="isStepComplete(step.id)"
        [class.step-current]="isStepCurrent(step.id)"
        [class.step-pending]="isStepPending(step.id)"
      >
        <button
          class="step-circle"
          (click)="onStepClick(step.id)"
          [disabled]="isStepPending(step.id)"
          [title]="step.label"
        >
          <i *ngIf="isStepComplete(step.id) && !isStepCurrent(step.id)" class="bi bi-check"></i>
          <i *ngIf="!isStepComplete(step.id)" [class]="'bi ' + step.icon"></i>
          <span *ngIf="isStepCurrent(step.id)" class="step-number">{{ i + 1 }}</span>
        </button>

        <span class="step-label">{{ step.label }}</span>

        <!-- Connector Line -->
        <div
          *ngIf="i < steps.length - 1"
          class="step-connector"
          [class.connector-complete]="isStepComplete(step.id)"
        ></div>
      </div>
    </div>
  </div>
</div>
