<nav class="bottom-nav-shell" aria-label="Mobile navigation">
  <a
    *ngFor="let item of primaryItems()"
    class="bottom-nav-item"
    [routerLink]="item.route"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: item.exactMatch ?? false }"
    [attr.aria-label]="item.label"
    (click)="onNavigationClick()"
  >
    <span class="icon-wrap">
      <i class="bi" [ngClass]="item.icon" aria-hidden="true"></i>
      <span *ngIf="getBadgeCount(item) > 0" class="item-badge" aria-label="Badge">{{ getBadgeCount(item) }}</span>
    </span>
    <span class="item-label">{{ item.label }}</span>
  </a>

  <button
    *ngIf="hasOverflow()"
    class="bottom-nav-item more-button"
    [class.active]="isOverflowActive() || isMoreOpen()"
    type="button"
    aria-label="More navigation"
    (click)="toggleMoreSheet()"
  >
    <span class="icon-wrap">
      <i class="bi bi-three-dots" aria-hidden="true"></i>
    </span>
    <span class="item-label">More</span>
  </button>
</nav>

<button
  *ngIf="isMoreOpen()"
  class="more-sheet-backdrop"
  type="button"
  aria-label="Close more menu"
  (click)="closeMoreSheet()">
</button>

<section *ngIf="isMoreOpen()" class="more-sheet" role="dialog" aria-modal="true" aria-label="More navigation">
  <header class="more-sheet-header">
    <h2>More</h2>
    <button type="button" aria-label="Close more menu" (click)="closeMoreSheet()">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
  </header>

  <div class="more-sheet-list">
    <a
      *ngFor="let item of overflowItems()"
      [routerLink]="item.route"
      class="more-sheet-item"
      (click)="onNavigationClick()"
    >
      <span class="icon-wrap">
        <i class="bi" [ngClass]="item.icon" aria-hidden="true"></i>
        <span *ngIf="getBadgeCount(item) > 0" class="item-badge" aria-label="Badge">{{ getBadgeCount(item) }}</span>
      </span>
      <span>{{ item.label }}</span>
    </a>
  </div>
</section>
