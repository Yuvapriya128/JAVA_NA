<header class="navbar-shell" role="banner">
  <div class="navbar-left">
    <h1 class="title">Ecom</h1>
  </div>

  <div class="navbar-right">
    <label class="search-box desktop-search" aria-label="Search">
      <i class="bi bi-search"></i>
      <input type="search" placeholder="Search products, orders, customers" />
    </label>

    <button class="icon-btn mobile-search-btn" type="button" aria-label="Open search" (click)="openMobileSearch()">
      <i class="bi bi-search"></i>
    </button>

    <button class="icon-btn" type="button" aria-label="Toggle theme" (click)="toggleTheme()">
      <i class="bi" [ngClass]="isDarkMode() ? 'bi-sun' : 'bi-moon-stars'"></i>
    </button>

    <button class="icon-btn" type="button" aria-label="Notifications">
      <i class="bi bi-bell"></i>
      <span class="dot"></span>
    </button>

    <a class="icon-btn mobile-profile-btn" routerLink="/profile" aria-label="Profile">
      <i class="bi bi-person"></i>
    </a>

    <a class="profile-chip" routerLink="/profile" aria-label="Current user">
      <span class="avatar"><i class="bi bi-person"></i></span>
      <span class="profile-text">
        <strong>{{ userLabel() }}</strong>
        <small class="role-badge">{{ roleLabel() }}</small>
      </span>
    </a>
  </div>
</header>

<section *ngIf="isMobileSearchOpen()" class="mobile-search-overlay" role="dialog" aria-modal="true" aria-label="Search">
  <header class="mobile-search-header">
    <button type="button" aria-label="Close search" (click)="closeMobileSearch()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <div class="mobile-search-input">
      <i class="bi bi-search"></i>
      <input type="search" placeholder="Search products, orders, customers" autofocus />
    </div>
  </header>
</section>
