<header class="navbar-shell" role="banner">
  <div class="navbar-left">
    <h1 class="title">Ecommerce Control Panel</h1>
    <p class="subtitle">Manage products, customers, and orders from one place</p>
  </div>

  <div class="navbar-right">
    <label class="search-box" aria-label="Search">
      <i class="bi bi-search"></i>
      <input type="search" placeholder="Search products, orders, customers" />
    </label>

    <button class="icon-btn" type="button" aria-label="Notifications">
      <i class="bi bi-bell"></i>
      <span class="dot"></span>
    </button>

    <div class="profile-chip" aria-label="Current user">
      <span class="avatar"><i class="bi bi-person"></i></span>
      <span class="profile-text">
        <strong>{{ userLabel() }}</strong>
        <small class="role-badge">{{ roleLabel() }}</small>
      </span>
    </div>
  </div>
</header>
