spring.application.name=springDataJpaDemo

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/northernarc
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# LOGGING CONFIGURATION FOR DEBUGGING
# ========================================
# Root logger level
logging.level.root=WARN

# Security-related loggers
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.access=DEBUG

# Application-specific loggers
logging.level.org.example.springdatajpademo.Ecommerce.security=DEBUG
logging.level.org.example.springdatajpademo.Ecommerce.service=DEBUG

# Authentication provider logging
logging.level.org.springframework.security.authentication.dao.DaoAuthenticationProvider=DEBUG

# JWT and application logs
logging.level.org.example.springdatajpademo=DEBUG

# Log pattern for better readability
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
