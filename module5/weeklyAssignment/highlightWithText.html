<html>
<head>
    <title>h1 highlighting with event binding</title>
</head>
<body>
<table cellpadding="20px">
    <thead>
    <tr>
        <td><h1 onclick="homeclick()" id="home">home</h1></td>
        <td><h1 onclick="aboutclick()" id="about">about</h1></td>
        <td><h1 onclick="serviceclick()" id="service">service</h1></td>
        <td><h1 onclick="contactclick()" id="contact">contact</h1></td>
    </tr>
    </thead>
</table>
<div id="content"></div>


</body>
<script>
    function homeclick() {
        document.getElementById('content').innerHTML = 'HELLO, You are in Home page';

        document.getElementById("home").style.color="red";
        document.getElementById("about").style.color="black";
        document.getElementById("service").style.color="black";
        document.getElementById("contact").style.color="black";
    }
    function aboutclick() {
        document.getElementById('content').innerHTML = 'HELLO, You are in About Page';
        document.getElementById("home").style.color="black";
        document.getElementById("about").style.color="red";
        document.getElementById("service").style.color="black";
        document.getElementById("contact").style.color="black";

    }
    function contactclick() {
        document.getElementById('content').innerHTML = 'HELLO, You are in Contact Page';
        document.getElementById("home").style.color="black";
        document.getElementById("about").style.color="black";
        document.getElementById("service").style.color="black";
        document.getElementById("contact").style.color="red";
    }
    function serviceclick() {
        document.getElementById('content').innerHTML = 'HELLO, You are in Service Page';
        document.getElementById("home").style.color="black";
        document.getElementById("about").style.color="black";
        document.getElementById("service").style.color="red";
        document.getElementById("contact").style.color="black";
    }

</script>
</html>
