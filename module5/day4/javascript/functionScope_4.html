<html>
<head>
    <title>Function Scope Example</title>
</head>
<body>
</body>
<script>
    var globaldata="Hello universe";
    function  demo(){
        var localdata="Hello local";
        console.log(localdata);
        for(var i=0;i<5;i++){
            console.log(i+" ");
        }
        // var is functional scope
        // let is block scope
        console.log(i);

        for(let j=0;j<5;j++){
            console.log(j);
        }
        // this will give uncaught reference error, as i used let
        // for j, can't access outside block scope
        // console.log(j);
    }
    demo();
    alert(globaldata);
</script>
</html>
