<html>
<body>
<script>
    function mypromise(){
        return new Promise(((resolve,reject)=>{
            setTimeout(()=>{
                let answer=Math.round(Math.random());
                if(answer===1){
                    resolve();
                }else{
                    reject();
                }
            },Math.random()*5*1000);
        }))
    }
    // arrow function
    mypromise().then(()=>alert("done")).catch(()=>alert("not done"));
</script>
</body>
</html>
